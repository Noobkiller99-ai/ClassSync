services:
  - type: web
    name: class-sync
    env: python
    region: singapore          # closest to India
    plan: free
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: gunicorn "class_sync.web:create_app()" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true    # Render auto-generates a secure random value
      - key: RENDER
        value: true            # Tells the app it's running on cloud (disables headed browser popup)
      - key: GOOGLE_CLIENT_ID
        sync: false            # Set manually in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false            # Set manually in Render dashboard
      - key: GOOGLE_REDIRECT_URI
        sync: false            # Set to https://<your-render-url>/google/callback
